events {
  worker_connections 1024;
}

http {
  # Echo back the request Origin for allowed origins only.
  # When there is no Origin header (non-browser client) $cors_origin is
  # empty and nginx omits the CORS headers entirely, which is harmless.
  map $http_origin $cors_origin {
    default                          "";
    ~^http://localhost(:\d+)?$       $http_origin;
    # Add production domain here, e.g.:
    # "https://app.greenlab.io"     $http_origin;
  }

  upstream iam             { server iam:8001; }
  upstream device_registry { server device-registry:8002; }
  upstream ingestion       { server ingestion:8003; }
  upstream normalization   { server normalization:8006; }
  upstream query_realtime  { server query-realtime:8004; }
  upstream alert_notif     { server alert-notification:8005; }
  upstream supporting      { server supporting:8007; }

  server {
    listen 8080;

    # ── CORS ─────────────────────────────────────────────────────────────
    # Single source of truth for all CORS headers.
    # add_header at server level is inherited by every location that does
    # NOT define its own add_header directives.
    add_header Access-Control-Allow-Origin      $cors_origin always;
    add_header Access-Control-Allow-Credentials true always;
    add_header Access-Control-Allow-Methods     "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
    add_header Access-Control-Allow-Headers     "Authorization, Content-Type, X-Request-ID, X-API-Key" always;
    add_header Access-Control-Expose-Headers    "X-Request-ID" always;
    add_header Access-Control-Max-Age           3600 always;

    # ── Common upstream request headers ──────────────────────────────────
    # Inherited by locations that do NOT define their own proxy_set_header.
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── Preflight ─────────────────────────────────────────────────────────
    # Browsers send OPTIONS before every credentialed cross-origin request.
    # Respond immediately — server-level add_header directives above are
    # inherited here because this if block defines no add_header of its own.
    if ($request_method = OPTIONS) {
      return 204;
    }

    # ── Health (used by docker healthcheck) ───────────────────────────────
    # NOTE: defining add_header here would drop server-level CORS headers.
    # Use default_type instead so Content-Type is set without an add_header.
    location = /health {
      default_type text/plain;
      return 200 "ok\n";
    }

    # ── IAM: auth, orgs, api-keys, workspace CRUD + members ──────────────
    location /api/v1/auth     { proxy_pass http://iam; }
    location /api/v1/orgs     { proxy_pass http://iam; }
    location /api/v1/api-keys { proxy_pass http://iam; }

    # /workspaces/{id}/devices → device-registry.
    # Regex location takes priority over the prefix location below.
    location ~ ^/api/v1/workspaces/[^/]+/devices {
      proxy_pass http://device_registry;
    }

    # Remaining workspace routes (CRUD + members) → IAM
    location /api/v1/workspaces { proxy_pass http://iam; }

    # ── Device Registry: devices, channels, fields ────────────────────────
    location /api/v1/devices  { proxy_pass http://device_registry; }
    location /api/v1/channels { proxy_pass http://device_registry; }
    location /api/v1/fields   { proxy_pass http://device_registry; }

    # ── Ingestion: POST /v1/channels/{id}/data (single + bulk) ───────────
    location ~ ^/v1/channels/[^/]+/data {
      proxy_pass http://ingestion;
    }

    # ── Query & Realtime ──────────────────────────────────────────────────
    location /api/v1/query { proxy_pass http://query_realtime; }
    location /api/v1/stats { proxy_pass http://query_realtime; }

    # WebSocket – override proxy_set_header to add upgrade headers.
    # Must re-declare Host/X-Real-IP because any proxy_set_header in a
    # location replaces all inherited proxy_set_header directives.
    location /api/v1/ws {
      proxy_pass         http://query_realtime;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
      # Nginx already validates Origin via the $cors_origin map above.
      # Clear it before forwarding so the backend's CheckOrigin always passes.
      proxy_set_header   Origin            "";
      proxy_read_timeout 3600s;
    }

    # SSE – disable buffering so events stream immediately.
    location /api/v1/sse {
      proxy_pass         http://query_realtime;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   Connection        "";
      proxy_buffering    off;
      proxy_cache        off;
      proxy_read_timeout 3600s;
    }

    # ── Alert & Notification ──────────────────────────────────────────────
    location /api/v1/alert-rules   { proxy_pass http://alert_notif; }
    location /api/v1/notifications { proxy_pass http://alert_notif; }

    # ── Supporting: audit events, video streams ───────────────────────────
    location /api/v1/audit   { proxy_pass http://supporting; }
    location /api/v1/streams { proxy_pass http://supporting; }
  }
}
