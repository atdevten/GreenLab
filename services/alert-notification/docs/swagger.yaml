basePath: /
definitions:
  http.CreateRuleRequest:
    properties:
      channel_id:
        type: string
      condition:
        type: string
      cooldown_sec:
        type: integer
      field_name:
        type: string
      message:
        type: string
      name:
        type: string
      severity:
        type: string
      threshold:
        type: number
      workspace_id:
        type: string
    required:
    - channel_id
    - condition
    - field_name
    - name
    - severity
    - threshold
    - workspace_id
    type: object
  http.NotificationResponse:
    properties:
      channel_type:
        type: string
      created_at:
        type: string
      id:
        type: string
      read:
        type: boolean
      read_at:
        type: string
      recipient:
        type: string
      retries:
        type: integer
      sent_at:
        type: string
      status:
        type: string
      subject:
        type: string
      workspace_id:
        type: string
    type: object
  http.RuleResponse:
    properties:
      channel_id:
        type: string
      condition:
        type: string
      cooldown_sec:
        type: integer
      created_at:
        type: string
      enabled:
        type: boolean
      field_name:
        type: string
      id:
        type: string
      message:
        type: string
      name:
        type: string
      severity:
        type: string
      threshold:
        type: number
      workspace_id:
        type: string
    type: object
  http.SendNotificationRequest:
    properties:
      body:
        type: string
      channel_type:
        type: string
      recipient:
        type: string
      subject:
        type: string
      workspace_id:
        type: string
    required:
    - body
    - channel_type
    - recipient
    - subject
    - workspace_id
    type: object
  http.UpdateRuleRequest:
    properties:
      cooldown_sec:
        type: integer
      enabled:
        type: boolean
      message:
        type: string
      name:
        type: string
      severity:
        type: string
      threshold:
        type: number
    type: object
host: localhost:8005
info:
  contact: {}
  description: Alert rule management and notification dispatch for the GreenLab IoT
    platform.
  title: GreenLab Alert-Notification API
  version: "1.0"
paths:
  /api/v1/alert-rules:
    get:
      parameters:
      - description: Filter by workspace ID
        in: query
        name: workspace_id
        type: string
      - description: Page size
        in: query
        name: limit
        type: integer
      - description: Page offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/http.RuleResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List alert rules for a workspace
      tags:
      - alert-rules
    post:
      consumes:
      - application/json
      parameters:
      - description: Alert rule definition
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/http.CreateRuleRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/http.RuleResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create a new alert rule
      tags:
      - alert-rules
  /api/v1/alert-rules/{id}:
    delete:
      parameters:
      - description: Rule ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Delete an alert rule
      tags:
      - alert-rules
    get:
      parameters:
      - description: Rule ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.RuleResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get an alert rule by ID
      tags:
      - alert-rules
    put:
      consumes:
      - application/json
      parameters:
      - description: Rule ID
        in: path
        name: id
        required: true
        type: string
      - description: Update fields
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/http.UpdateRuleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.RuleResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Update an alert rule
      tags:
      - alert-rules
  /api/v1/notifications:
    get:
      parameters:
      - description: Filter by workspace ID
        in: query
        name: workspace_id
        type: string
      - description: Page size
        in: query
        name: limit
        type: integer
      - description: Page offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/http.NotificationResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List notifications for a workspace
      tags:
      - notifications
    post:
      consumes:
      - application/json
      parameters:
      - description: Notification details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/http.SendNotificationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/http.NotificationResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Send a notification
      tags:
      - notifications
  /api/v1/notifications/{id}:
    get:
      parameters:
      - description: Notification ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.NotificationResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get a notification by ID
      tags:
      - notifications
  /api/v1/notifications/{id}/read:
    patch:
      parameters:
      - description: Notification ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Mark a notification as read
      tags:
      - notifications
  /api/v1/notifications/read-all:
    post:
      responses:
        "204":
          description: No Content
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Mark all notifications as read for the authenticated tenant
      tags:
      - notifications
  /health:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Health check
      tags:
      - health
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
